<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приглашение на свадьбу</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Немного красоты, чтобы сайт выглядел аккуратно */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px; background-color: #f9f9f9; }
        h1 { color: #d4a373; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background-color: #d4a373; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-no { background-color: #e9edc9; color: #606c38; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Приглашение</h1>
        <p>Мы будем рады видеть вас на нашем празднике!</p>
        
        <input type="text" id="name" placeholder="Введите ваше имя и фамилию">
        
        <br>
        <button class="btn" onclick="sendData('Приду')">Я приду!</button>
        <button class="btn btn-no" onclick="sendData('Не смогу')">Не смогу</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp; // Получаем объект Mini App
        tg.expand(); // Разворачиваем окно

        function sendData(status) {
            let name = document.getElementById('name').value;
            if (name === "") {
                alert("Пожалуйста, напишите ваше имя");
                return;
            }

            // Формируем данные для отправки боту
            let data = {
                guest_name: name,
                answer: status
            };

            // Отправляем данные боту (это закроет Mini App)
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
